name: Quarterly refresh

on:
  schedule:
    # 09:00 UTC on the 1st of Mar/Jun/Sep/Dec — quarterly
    - cron: '0 9 1 3,6,9,12 *'
  workflow_dispatch:        # manual trigger button

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # to commit refreshed parquet back

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pdfplumber pandas pyarrow

      - name: Refresh live-API sources + rebuild parquet
        run: python scripts/refresh.py --out data/varieties.parquet

      - name: Commit if changed
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          if ! git diff --quiet data/varieties.parquet; then
            git add data/varieties.parquet data/varieties.csv data/CHANGELOG.md
            git commit -m "chore: quarterly refresh $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes to publish"
          fi

      - name: Notify Databricks (optional — triggers load_and_explore notebook)
        if: ${{ secrets.DATABRICKS_HOST != '' }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DATABRICKS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"job_id": ${{ vars.DATABRICKS_REFRESH_JOB_ID }}}' \
            ${{ secrets.DATABRICKS_HOST }}/api/2.1/jobs/run-now
